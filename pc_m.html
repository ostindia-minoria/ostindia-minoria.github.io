<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#030712">
    <title>OCEAN OS - Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @font-face {
            font-family: 'Inter';
            src: url('fonts/Inter-Regular.woff2') format('woff2');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        * {
            box-sizing: border-box;
        }

        html {
            height: 100%;
            height: 100dvh;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #030712;
            color: #e2e8f0;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            min-height: 100dvh;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Video Background */
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }

        .video-bg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.4;
        }

        .video-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent, rgba(0, 0, 0, 0.8));
            z-index: -1;
        }

        /* Header */
        header {
            background-color: rgba(17, 24, 39, 0.85);
            backdrop-filter: blur(12px);
            z-index: 100;
            border-bottom: 1px solid rgba(168, 85, 247, 0.2);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            flex-shrink: 0;
        }

        .header-content {
            height: 72px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-text {
            color: white;
            font-weight: 800;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(168, 85, 247, 0.5);
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .logo-text:hover {
            color: #d8b4fe;
            text-shadow: 0 0 20px rgba(168, 85, 247, 0.8);
        }

        nav a {
            color: #9ca3af;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        nav a:hover {
            color: white;
        }

        .active-link {
            color: #d8b4fe;
            font-weight: 600;
        }

        /* PC Container */
        .pc-workspace {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            perspective: 1000px;
            min-height: 0;
        }

        /* Computer Styles */
        .egor-file-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            text-align: center;
            touch-action: manipulation;
        }

        .egor-file-item:hover {
            background: rgba(0, 120, 215, 0.1);
        }

        .egor-file-item i {
            font-size: 2rem;
            margin-bottom: 6px;
        }

        @keyframes pulse-glow {
            0% {
                box-shadow: 0 0 15px rgba(234, 179, 8, 0.2);
            }

            50% {
                box-shadow: 0 0 30px rgba(234, 179, 8, 0.4);
            }

            100% {
                box-shadow: 0 0 15px rgba(234, 179, 8, 0.2);
            }
        }

        /* Desktop icons: icon-only, no labels, compact rounded tiles */
        #os-desktop-icons {
            display: grid !important;
            grid-template-columns: repeat(2, auto);
            gap: 0.75rem;
            padding: 1rem 1.2rem !important;
            justify-content: start;
            align-content: start;
        }

        .desktop-shortcut {
            width: 3.6rem;
            height: 3.6rem;
            border-radius: 0.85rem;
            background: rgba(15, 23, 42, 0.72);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .desktop-shortcut:hover {
            background: rgba(15, 23, 42, 0.9);
            transform: scale(1.06);
        }

        .desktop-shortcut:active {
            transform: scale(0.95);
        }

        .desktop-shortcut i {
            font-size: 1.55rem;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
        }

        /* Вся область «экрана» ОС */
        #egor-pc-screen-os {
            position: relative;
            height: 100%;
            min-height: 0;
            box-sizing: border-box;
        }

        #os-workspace {
            min-height: 0;
        }

        /* Notepad: bounded flex column (only when visible — do not override .hidden) */
        #os-window-notepad:not(.hidden) {
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        #os-notepad-content {
            flex: 1 1 0%;
            min-height: 0;
            overflow-y: scroll;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
            touch-action: pan-y;
        }

        /* Рамка экрана: классическая 16:9, без раздувания flex’ом */
        .pc-monitor-bezel {
            width: 100%;
            max-width: 100%;
            aspect-ratio: 16 / 9;
            height: auto;
            flex-shrink: 0;
        }

        /* Как на pc.html: монитор + системный блок в ряд */
        #egor-pc-monitor-wrap {
            flex: 1 1 0%;
            min-width: 0;
            max-width: min(800px, 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            align-self: stretch;
        }

        #egor-pc-monitor-wrap .monitor-stand-neck {
            width: min(8rem, 28vw);
        }

        #egor-pc-monitor-wrap .monitor-stand-base {
            width: min(12rem, 42vw);
        }

        /* Tap feedback — do not apply touch-action: manipulation to all <a>
           (breaks vertical scrolling inside notepad on iOS when links are present) */
        button,
        .egor-file-item {
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        header a,
        .logo-text {
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .audio-unlock-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            color: white;
            cursor: pointer;
            transition: opacity 0.4s ease;
        }

        .audio-unlock-overlay.hidden-fade {
            opacity: 0;
            pointer-events: none;
        }

        .audio-unlock-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid rgba(168, 85, 247, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(168, 85, 247, 0.1);
            animation: pulse-unlock 2s ease-in-out infinite;
        }

        @keyframes pulse-unlock {

            0%,
            100% {
                box-shadow: 0 0 20px rgba(168, 85, 247, 0.2);
                transform: scale(1);
            }

            50% {
                box-shadow: 0 0 40px rgba(168, 85, 247, 0.4);
                transform: scale(1.05);
            }
        }

        /* Экран «поверните устройство» (только портрет на touch) */
        #mobile-rotate-screen {
            position: fixed;
            inset: 0;
            z-index: 10000;
            background: radial-gradient(circle at center, #111827 0%, #030712 100%);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            color: white;
            text-align: center;
            padding: 2rem;
            padding-bottom: max(2rem, env(safe-area-inset-bottom));
            backdrop-filter: blur(20px);
        }

        #mobile-rotate-screen.visible {
            display: flex;
        }

        .rotate-icon-container {
            position: relative;
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .rotate-phone-icon {
            width: 50px;
            height: 90px;
            border: 3px solid #6366f1;
            border-radius: 12px;
            background: rgba(99, 102, 241, 0.1);
            position: relative;
            animation: rotateDevice 3s cubic-bezier(0.65, 0, 0.35, 1) infinite;
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.3);
        }

        .rotate-phone-icon::after {
            content: '';
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #6366f1;
        }

        @keyframes rotateDevice {
            0% {
                transform: rotate(0deg);
                opacity: 0.5;
            }

            25%,
            75% {
                transform: rotate(-90deg);
                opacity: 1;
            }

            100% {
                transform: rotate(0deg);
                opacity: 0.5;
            }
        }

        .rotate-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px dashed rgba(99, 102, 241, 0.2);
            border-radius: 50%;
            animation: spinRing 10s linear infinite;
        }

        @keyframes spinRing {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .rotate-title {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .rotate-subtitle {
            font-size: 1rem;
            color: #94a3b8;
            max-width: 300px;
            line-height: 1.6;
            font-weight: 400;
        }

        /* Monitor frame buttons — same as pc.html (photo reference) */
        .monitor-screen-btn {
            position: absolute;
            z-index: 60;
            border: none;
            padding: 0;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .monitor-screen-btn:active {
            transform: scale(0.94);
        }

        .monitor-close-btn {
            top: 0.35rem;
            right: 0.35rem;
            width: 34px;
            height: 34px;
            border-radius: 7px;
            background: #000;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.65);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .monitor-close-btn__x {
            position: relative;
            width: 42%;
            height: 42%;
            display: block;
        }

        .monitor-close-btn__x::before,
        .monitor-close-btn__x::after {
            content: '';
            position: absolute;
            left: 50%;
            top: 50%;
            width: 132%;
            height: 3px;
            background: #fff;
            border-radius: 2px;
            transform-origin: center;
        }

        .monitor-close-btn__x::before {
            transform: translate(-50%, -50%) rotate(45deg);
        }

        .monitor-close-btn__x::after {
            transform: translate(-50%, -50%) rotate(-45deg);
        }

        .monitor-power-btn {
            bottom: 0.55rem;
            right: 0.55rem;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(180deg, #ffb347 0%, #ff8c00 42%, #c2410c 100%);
            box-shadow:
                inset 0 2px 6px rgba(255, 255, 255, 0.35),
                inset 0 -3px 10px rgba(0, 0, 0, 0.35),
                0 8px 22px rgba(0, 0, 0, 0.55);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .monitor-power-btn--on {
            box-shadow:
                inset 0 2px 6px rgba(255, 255, 255, 0.45),
                inset 0 -3px 10px rgba(0, 0, 0, 0.25),
                0 0 0 2px rgba(255, 255, 255, 0.35),
                0 10px 26px rgba(234, 88, 12, 0.45);
        }

        .monitor-power-btn__icon {
            width: 52%;
            height: 52%;
            display: block;
            fill: none;
            stroke: #fff;
            stroke-width: 2;
            stroke-linecap: round;
        }

        /* Touch / landscape phone: same monitor frame as desktop (bezel + stand), scaled to fit */
        @media (hover: none) and (pointer: coarse) {
            body {
                overflow: hidden !important;
                height: 100vh !important;
                height: 100dvh !important;
                min-height: 100vh !important;
                min-height: 100dvh !important;
            }

            header {
                display: none !important;
            }

            .pc-workspace {
                padding: max(0.35rem, env(safe-area-inset-top)) max(0.35rem, env(safe-area-inset-right)) max(0.35rem, env(safe-area-inset-bottom)) max(0.35rem, env(safe-area-inset-left)) !important;
                overflow: hidden !important;
                display: flex !important;
                align-items: center !important;
                justify-content: center !important;
                min-height: 0 !important;
                flex: 1 1 auto !important;
                height: 100dvh !important;
            }

            .pc-main-layout {
                flex-direction: row !important;
                align-items: center !important;
                justify-content: center !important;
                gap: 0 !important;
                width: 100% !important;
                max-width: 100% !important;
                flex-wrap: nowrap !important;
                overflow: hidden !important;
                box-sizing: border-box !important;
                height: 100% !important;
            }

            #egor-pc-monitor-wrap {
                flex: 0 1 auto !important;
                width: min(96vw, 900px) !important;
                max-width: 100% !important;
                max-height: 100% !important;
                min-height: 0 !important;
                justify-content: center !important;
            }

            #egor-pc-monitor-wrap .pc-monitor-bezel {
                width: 100% !important;
                max-width: 100% !important;
                max-height: calc(100dvh - 5.5rem) !important;
                height: auto !important;
                aspect-ratio: 16 / 9 !important;
                border-width: 12px !important;
                border-radius: 0.5rem !important;
                flex: 0 0 auto !important;
            }

            #egor-pc-monitor-wrap .monitor-stand-neck,
            #egor-pc-monitor-wrap .monitor-stand-base {
                display: block !important;
            }

            #egor-pc-screen-os {
                background-size: cover !important;
                background-position: center !important;
            }

            #os-desktop-icons {
                grid-template-columns: repeat(2, auto) !important;
                gap: 0.85rem !important;
                padding: 1rem 1.2rem !important;
            }

            #os-desktop-icons .desktop-shortcut {
                width: 4rem !important;
                height: 4rem !important;
                border-radius: 1rem !important;
            }

            #os-desktop-icons .desktop-shortcut i {
                font-size: 1.75rem !important;
            }

            #os-taskbar {
                height: 2.75rem !important;
                padding-left: 0.75rem !important;
                padding-right: 0.75rem !important;
            }
        }

        @media (hover: none) and (pointer: coarse) and (max-height: 520px) {
            .monitor-power-btn {
                width: 44px !important;
                height: 44px !important;
            }

            .monitor-close-btn {
                width: 30px !important;
                height: 30px !important;
            }
        }
    </style>
</head>

<body>
    <div class="video-container">
        <video class="video-bg" autoplay muted loop playsinline>
            <source src="assets/video/bg-history.mp4" type="video/mp4">
        </video>
        <div class="video-overlay"></div>
    </div>

    <div id="mobile-rotate-screen">
        <div class="rotate-icon-container">
            <div class="rotate-ring"></div>
            <div class="rotate-phone-icon"></div>
        </div>
        <div class="text-center">
            <h2 class="rotate-title">Поверните устройство</h2>
            <p class="rotate-subtitle">Для OCEAN OS нужна альбомная ориентация экрана</p>
        </div>
    </div>

    <!-- Audio unlock overlay for mobile -->
    <div id="audio-unlock" class="audio-unlock-overlay" style="display:none;">
        <div class="audio-unlock-icon">
            <i class="fas fa-volume-up text-purple-400 text-3xl"></i>
        </div>
        <div class="text-center">
            <p class="text-lg font-semibold mb-1">Нажмите, чтобы начать</p>
            <p class="text-sm text-gray-400">Для корректной работы звука</p>
        </div>
    </div>

    <header>
        <div class="container mx-auto px-6 header-content">
            <a href="index.html" class="logo-text">Ost-India / Minoria</a>
            <nav class="flex space-x-4 sm:space-x-10 flex-shrink-0">
                <a href="index.html">Главная</a>
                <a href="history.html">История</a>
                <a href="radio.html">Радио</a>
            </nav>
        </div>
    </header>

    <main class="pc-workspace">
        <div class="pc-main-layout flex flex-row items-center justify-center z-10 w-full max-w-6xl px-0.5 sm:px-2">
            <!-- Монитор (как pc.html: рамка, подставка, X и питание на рамке) -->
            <div id="egor-pc-monitor-wrap"
                class="relative w-full max-w-[800px] flex flex-col items-center shrink transition-all duration-500">
                <button type="button" id="monitor-close-btn" class="monitor-screen-btn monitor-close-btn" aria-label="Выход">
                    <span class="monitor-close-btn__x" aria-hidden="true"></span>
                </button>
                <button type="button" id="monitor-power-btn" class="monitor-screen-btn monitor-power-btn" aria-label="Питание">
                    <svg class="monitor-power-btn__icon" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M12 2v10" stroke-linecap="round" />
                        <path d="M18.364 5.636a9 9 0 1 1-12.728 0" stroke-linecap="round" />
                    </svg>
                </button>
                <div
                    class="pc-monitor-bezel w-full bg-black rounded-lg border-[12px] border-gray-800 shadow-[0_30px_60px_rgba(0,0,0,0.9)] relative overflow-hidden aspect-video">

                    <!-- Выключен -->
                    <div id="egor-pc-screen-off" class="absolute inset-0 bg-black z-50"></div>

                    <!-- Загрузка -->
                    <div id="egor-pc-screen-boot"
                        class="absolute inset-0 bg-black z-40 hidden flex items-center justify-center">
                        <div class="text-white text-3xl font-light tracking-widest flex items-center gap-4 opacity-0 transition-opacity duration-500"
                            id="egor-pc-boot-logo">
                            <i
                                class="fas fa-water text-blue-500 text-4xl drop-shadow-[0_0_15px_rgba(59,130,246,0.5)]"></i>
                            <span>OCEAN OS</span>
                        </div>
                    </div>

                    <!-- Система -->
                    <div id="egor-pc-screen-os" class="absolute inset-0 z-30 hidden bg-cover bg-center flex flex-col"
                        style="background-image: url('assets/images/computer/w.png'); font-family: 'Inter', sans-serif;">

                        <!-- Рабочая область ОС -->
                        <div class="relative flex-1 w-full text-sm text-gray-200 select-none overflow-hidden text-left"
                            id="os-workspace">

                            <!-- Иконки рабочего стола -->
                            <div id="os-desktop-icons"
                                class="absolute inset-0 p-4 flex flex-col flex-wrap gap-4 content-start">
                            </div>

                            <!-- Проводник -->
                            <div id="os-window-explorer"
                                class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-[80%] h-[80%] bg-white/95 backdrop-blur-md shadow-2xl rounded-lg hidden flex-col overflow-hidden text-gray-800 shadow-[0_50px_100px_rgba(0,0,0,0.6)]">
                                <div
                                    class="h-10 bg-gray-100 border-b border-gray-200 flex justify-between items-center px-4 select-none">
                                    <span class="font-medium text-sm flex items-center gap-3" id="os-window-title"><i
                                            class="fas fa-hdd text-gray-500"></i> Этот компьютер</span>
                                    <button id="os-window-close"
                                        class="text-gray-500 hover:text-orange-500 transition-colors focus:outline-none"><i
                                            class="fas fa-times text-lg"></i></button>
                                </div>
                                <div
                                    class="h-10 bg-gray-50 border-b border-gray-200 flex items-center px-4 gap-4 text-sm">
                                    <button id="os-nav-back"
                                        class="text-gray-400 hover:text-blue-500 transition-colors cursor-pointer focus:outline-none"><i
                                            class="fas fa-arrow-left"></i></button>
                                    <div class="flex-1 bg-white border border-gray-200 rounded px-3 py-1.5 text-gray-600 flex items-center shadow-inner overflow-hidden text-ellipsis whitespace-nowrap"
                                        id="os-path-bar">Этот компьютер</div>
                                </div>
                                <div class="flex-1 min-h-0 bg-white p-6 overflow-y-auto" id="os-explorer-content">
                                    <!-- Контент проводника -->
                                </div>
                            </div>

                            <!-- Окно пароля -->
                            <div id="os-window-password"
                                class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-[60%] sm:w-72 bg-white/95 backdrop-blur shadow-2xl rounded-xl hidden flex-col justify-center items-center text-gray-800 z-50 p-8 border border-gray-200">
                                <button id="os-pwd-close"
                                    class="absolute top-3 right-4 text-gray-400 hover:text-gray-600 focus:outline-none"><i
                                        class="fas fa-times"></i></button>
                                <i class="fas fa-lock text-4xl text-blue-500 mb-6"></i>
                                <h5 class="text-base font-semibold mb-6 text-center">Требуется пароль</h5>
                                <input type="password" id="os-pwd-input" inputmode="numeric"
                                    autocomplete="current-password" enterkeyhint="done"
                                    class="w-full border border-gray-300 rounded-lg px-4 py-2 text-center text-lg mb-3 focus:outline-none focus:border-blue-500 shadow-inner"
                                    placeholder="••••">
                                <p id="os-pwd-error" class="text-orange-600 text-xs hidden mb-4">Неверный пароль</p>
                                <button id="os-pwd-submit"
                                    class="w-full bg-blue-500 text-white rounded-lg py-2.5 font-medium hover:bg-blue-600 focus:outline-none transition-all active:scale-95 shadow-md">Войти</button>
                            </div>

                            <!-- Текстовый редактор -->
                            <div id="os-window-notepad"
                                class="absolute inset-[5%] hidden flex flex-col overflow-hidden bg-white shadow-2xl rounded-lg text-gray-800 z-[55] border border-gray-200">
                                <div
                                    class="h-10 shrink-0 bg-gray-100 border-b border-gray-200 flex justify-between items-center px-4 select-none">
                                    <span

    <script>
        (function () {
            const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
            const rotateScreen = document.getElementById('mobile-rotate-screen');
            const audioUnlockOverlay = document.getElementById('audio-unlock');
            let audioContextUnlocked = false;

            function checkOrientation() {
                if (!isTouchDevice || !rotateScreen) return;
                if (window.innerHeight > window.innerWidth) {
                    rotateScreen.classList.add('visible');
                } else {
                    rotateScreen.classList.remove('visible');
                }
            }
            window.addEventListener('resize', checkOrientation);
            window.addEventListener('orientationchange', checkOrientation);
            checkOrientation();

            const screenOff = document.getElementById('egor-pc-screen-off');
            const screenBoot = document.getElementById('egor-pc-screen-boot');
            const bootLogo = document.getElementById('egor-pc-boot-logo');
            const screenOs = document.getElementById('egor-pc-screen-os');
            const monitorPwrBtn = document.getElementById('monitor-power-btn');
            const monitorCloseBtn = document.getElementById('monitor-close-btn');
            const desktopIconsContainer = document.getElementById('os-desktop-icons');
            const taskbarTime = document.getElementById('os-taskbar-time');
            const taskbarDate = document.getElementById('os-taskbar-date');
            const startMenu = document.getElementById('os-start-menu');
            const startBtn = document.getElementById('os-start-btn');
            const startExplorer = document.getElementById('os-start-explorer');
            const startShutdown = document.getElementById('os-start-shutdown');
            const osWorkspace = document.getElementById('os-workspace');
            const winExplorer = document.getElementById('os-window-explorer');
            const winExplorerClose = document.getElementById('os-window-close');
            const explorerContent = document.getElementById('os-explorer-content');
            const navBack = document.getElementById('os-nav-back');
            const pathBar = document.getElementById('os-path-bar');
            const winPassword = document.getElementById('os-window-password');
            const pwdInput = document.getElementById('os-pwd-input');
            const pwdSubmit = document.getElementById('os-pwd-submit');
            const pwdClose = document.getElementById('os-pwd-close');
            const pwdError = document.getElementById('os-pwd-error');
            const winNotepad = document.getElementById('os-window-notepad');
            const notepadClose = document.getElementById('os-notepad-close');
            const notepadContent = document.getElementById('os-notepad-content');
            const winGallery = document.getElementById('os-window-gallery');
            const galleryClose = document.getElementById('gallery-close');
            const galleryPrev = document.getElementById('gallery-prev');
            const galleryNext = document.getElementById('gallery-next');
            const galleryImg = document.getElementById('gallery-img');
            const galleryCounter = document.getElementById('gallery-counter');

            const audioPwr = new Audio('assets/sounds/computer/enable.mp3');
            audioPwr.volume = 0.5;
            const audioNoise = new Audio('assets/sounds/computer/n.mp3');
            audioNoise.loop = true;
            audioNoise.volume = 0.3;
            const audioClickObj = new Audio('assets/sounds/click.mp3');
            const audioKeyObj = new Audio('assets/sounds/key.mp3');

            let isPcOn = false;
            let bootCompleted = false;
            let bootFallbackTimer = null;

            function clearBootFallback() {
                if (bootFallbackTimer) {
                    clearTimeout(bootFallbackTimer);
                    bootFallbackTimer = null;
                }
            }

            function finishBootToOs() {
                clearBootFallback();
                if (!isPcOn || bootCompleted) return;
                bootCompleted = true;
                bootLogo.classList.remove('opacity-100');
                bootLogo.classList.add('opacity-0');
                setTimeout(() => {
                    if (!isPcOn) return;
                    screenBoot.classList.add('hidden');
                    screenOs.classList.remove('hidden');
                    screenOs.style.display = 'flex';
                    populateDesktop();
                    updateClock();
                    clockInterval = setInterval(updateClock, 30000);
                    audioNoise.play().catch(() => { });
                }, 200);
            }

            function tryEnterFullscreen() {
                if (!isTouchDevice) return;
                const docEl = document.documentElement;
                if (document.fullscreenElement || document.webkitFullscreenElement) return;
                const req = docEl.requestFullscreen
                    || docEl.webkitRequestFullscreen
                    || docEl.webkitEnterFullscreen;
                if (req) req.call(docEl).catch(() => { });
            }

            function unlockAudioContext() {
                if (audioContextUnlocked) return;
                audioContextUnlocked = true;
                tryEnterFullscreen();
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                ctx.resume().then(() => ctx.close());
                [audioPwr, audioNoise, audioClickObj, audioKeyObj].forEach(a => {
                    a.play().then(() => a.pause()).catch(() => { });
                    a.currentTime = 0;
                });
                if (audioUnlockOverlay) {
                    audioUnlockOverlay.classList.add('hidden-fade');
                    setTimeout(() => { audioUnlockOverlay.style.display = 'none'; }, 400);
                }
            }

            if (isTouchDevice && audioUnlockOverlay) {
                audioUnlockOverlay.style.display = 'flex';
                audioUnlockOverlay.addEventListener('click', unlockAudioContext, { once: true });
                audioUnlockOverlay.addEventListener('touchend', unlockAudioContext, { once: true });
            }

            function playSound(audioEl) {
                if (!audioContextUnlocked && isTouchDevice) return;
                const clone = audioEl.cloneNode();
                clone.volume = audioEl.volume;
                clone.play().catch(() => { });
            }

            let touchStartX = 0;
            let touchStartY = 0;
            if (isTouchDevice && winGallery) {
                winGallery.addEventListener('touchstart', (e) => {
                    touchStartX = e.touches[0].clientX;
                    touchStartY = e.touches[0].clientY;
                }, { passive: true });
                winGallery.addEventListener('touchend', (e) => {
                    const dx = e.changedTouches[0].clientX - touchStartX;
                    const dy = e.changedTouches[0].clientY - touchStartY;
                    if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) {
                        if (dx < 0) { galleryNext.click(); }
                        else { galleryPrev.click(); }
                    }
                }, { passive: true });
            }
            let hddInterval;
            let clockInterval;
            let currentPath = [];

            // ========== FILE SYSTEM ==========
            const osFiles = {
                type: 'root',
                children: [
                    {
                        name: 'Desktop', id: 'Desktop', type: 'hidden', children: [
                            { name: 'Этот компьютер', id: 'sys_computer', type: 'app_computer', icon: 'fa-desktop text-blue-300' },
                            { name: 'Корзина', id: 'sys_trash', type: 'app_trash', icon: 'fa-trash-alt text-gray-400' },
                            { name: 'readme.txt', id: 'readme', type: 'text', icon: 'fa-file-alt text-gray-200', content: 'Система инициализирована. Ожидание указаний.' },
                            { name: 'links.txt', id: 'links', type: 'links_file', icon: 'fa-file-alt text-yellow-300', content: 'МП с Егором #1\nhttps://youtu.be/DJpC81JinF0?si=a-1L1O1ZlbBpSY7r\n\nМП с Егором #2\nhttps://youtu.be/N6oYETLgrx8?si=Dm5pGO9BQfpS4jrk', links: ['https://youtu.be/DJpC81JinF0?si=a-1L1O1ZlbBpSY7r', 'https://youtu.be/N6oYETLgrx8?si=Dm5pGO9BQfpS4jrk'] }
                        ]
                    },
                    {
                        name: 'Локальный диск (C:)', id: 'C:', type: 'drive', icon: 'fa-hdd text-gray-500', children: [
                            {
                                name: 'System', id: 'System', type: 'folder', icon: 'fa-folder text-blue-400', children: [
                                    {
                                        name: 'passwords', id: 'passwords', type: 'folder', icon: 'fa-folder text-blue-400', children: [
                                            {
                                                name: '887.73', id: '887.73', type: 'folder', icon: 'fa-folder text-blue-400', children: [
                                                    {
                                                        name: 'TEBYA PRAVDA ZOVUT EVGENYI?', id: 'TEBYA PRAVDA ZOVUT EVGENYI?', type: 'folder', icon: 'fa-folder text-blue-400', children: [
                                                            { name: 'pass.txt', id: 'pass.txt', type: 'text', icon: 'fa-file-alt text-gray-500', content: '0921' }
                                                        ]
                                                    }
                                                ]
                                            }
                                        ]
                                    },
                                    { name: 'config.sys', id: 'config.sys', type: 'sys', icon: 'fa-cogs text-gray-500' },
                                    { name: 'boot.dll', id: 'boot.dll', type: 'sys', icon: 'fa-cogs text-gray-500' },
                                    { name: 'kernel.sys', id: 'kernel.sys', type: 'sys', icon: 'fa-cogs text-gray-500' },
                                    { name: 'ocean_drv.sys', id: 'ocean_drv', type: 'sys', icon: 'fa-cogs text-gray-500' }
                                ]
                            },
                            {
                                name: 'Users', id: 'Users', type: 'folder', icon: 'fa-folder text-blue-400', children: [
                                    {
                                        name: 'admin', id: 'admin', type: 'folder', icon: 'fa-user text-gray-400', children: [
                                            { name: 'settings.ini', id: 'settings', type: 'text', icon: 'fa-file-alt text-gray-500', content: 'theme=ocean; lang=ru;' }
                                        ]
                                    }
                                ]
                            },
                            {
                                name: 'Logs', id: 'Logs', type: 'folder', icon: 'fa-folder text-blue-400', children: [
                                    { name: 'error.log', id: 'err', type: 'text', icon: 'fa-file-alt text-gray-500', content: 'No errors.' }
                                ]
                            }
                        ]
                    },
                    {
                        name: 'Локальный диск (E:)', id: 'E:', type: 'drive', icon: 'fa-hdd text-gray-500', children: [
                            { name: 'locked', id: 'locked', type: 'locked_folder', icon: 'fa-folder-open text-yellow-500', pwd: '0921' },
                            {
                                name: 'Archive', id: 'Arch', type: 'folder', icon: 'fa-folder text-blue-400', children: [
                                    { name: 'data_01.dat', id: 'd1', type: 'sys', icon: 'fa-database text-gray-500' },
                                    { name: 'data_02.dat', id: 'd2', type: 'sys', icon: 'fa-database text-gray-500' }
                                ]
                            },
                            { name: 'Temp', id: 'Temp', type: 'folder', icon: 'fa-folder text-blue-400', children: [] }
                        ]
                    },
                    {
                        name: 'Сеть', id: 'Network', type: 'network', icon: 'fa-globe text-gray-500', children: [
                            { name: 'OFFICE-PC', id: 'net1', type: 'network_pc', icon: 'fa-desktop text-gray-400', children: [] },
                            {
                                name: 'PUBLIC-NAS', id: 'net2', type: 'network_pc', icon: 'fa-server text-gray-400', children: [
                                    { name: 'share.txt', id: 'net3', type: 'text', icon: 'fa-file-alt text-gray-500', content: 'Public share access granted' }
                                ]
                            }
                        ]
                    }
                ]
            };

            function updateClock() {
                if (!isPcOn) return;
                const now = new Date();
                const hh = String(now.getHours()).padStart(2, '0');
                const mm = String(now.getMinutes()).padStart(2, '0');
                const dd = String(now.getDate()).padStart(2, '0');
                const mth = String(now.getMonth() + 1).padStart(2, '0');
                const yy = now.getFullYear();
                taskbarTime.textContent = hh + ':' + mm;
                taskbarDate.textContent = dd + '.' + mth + '.' + yy;
            }

            function simulateHdd() {
                if (!isPcOn) return;
                clearInterval(hddInterval);
                hddInterval = setInterval(() => { }, Math.random() * 500 + 100);
            }

            // ========== DESKTOP (icon-only, no labels, neat grid) ==========
            function populateDesktop() {
                desktopIconsContainer.innerHTML = '';
                const dFiles = osFiles.children.find(c => c.id === 'Desktop').children;
                dFiles.forEach(item => {
                    const el = document.createElement('div');
                    el.className = 'desktop-shortcut';
                    el.innerHTML = '<i class="fas ' + item.icon + '"></i>';
                    el.onclick = () => {
                        playSound(audioClickObj);
                        if (item.type === 'app_computer') { currentPath = []; winExplorer.classList.remove('hidden'); renderExplorer(); }
                        else if (item.type === 'text') { openNotepad(item.name, item.content); }
                        else if (item.type === 'links_file') { openNotepad(item.name, item.content, item.links); }
                    };
                    desktopIconsContainer.appendChild(el);
                });
            }

            function getFolderData(pathArray) {
                let current = osFiles;
                for (let part of pathArray) {
                    current = current.children.find(c => c.id === part);
                    if (!current) return null;
                }
                return current;
            }

            function renderExplorer() {
                explorerContent.innerHTML = '';
                const dir = getFolderData(currentPath);
                let titlePath = 'Этот компьютер';
                if (currentPath.length > 0) titlePath += ' > ' + currentPath.join(' > ');
                pathBar.textContent = titlePath;
                if (currentPath.length === 0) navBack.classList.add('opacity-50', 'pointer-events-none');
                else navBack.classList.remove('opacity-50', 'pointer-events-none');
                if (!dir || !dir.children) return;
                const grid = document.createElement('div');
                grid.className = 'grid grid-cols-4 sm:grid-cols-5 md:grid-cols-6 gap-2 sm:gap-4';
                dir.children.forEach(item => {
                    if (item.type === 'hidden') return;
                    const el = document.createElement('div');
                    el.className = 'egor-file-item p-2 sm:p-3 rounded-lg hover:bg-blue-50 cursor-pointer flex flex-col items-center text-center transition-all hover:scale-105';
                    el.innerHTML = '<i class="fas ' + item.icon + ' text-4xl mb-1 sm:mb-2 drop-shadow-sm"></i><span class="text-xs text-gray-700 leading-tight font-medium" title="' + item.name + '">' + item.name + '</span>';
                    el.onclick = () => {
                        playSound(audioClickObj);
                        if (item.type === 'folder' || item.type === 'drive' || item.type === 'network' || item.type === 'network_pc') { currentPath.push(item.id); renderExplorer(); }
                        else if (item.type === 'locked_folder') openPasswordPrompt(item);
                        else if (item.type === 'text') { openNotepad(item.name, item.content); }
                        else if (item.type === 'links_file') { openNotepad(item.name, item.content, item.links); }
                    };
                    grid.appendChild(el);
                });
                explorerContent.appendChild(grid);
            }

            // ========== UI HANDLERS ==========
            startBtn.onclick = () => { playSound(audioClickObj); startMenu.classList.toggle('hidden'); };
            startExplorer.onclick = () => { playSound(audioClickObj); startMenu.classList.add('hidden'); winExplorer.classList.remove('hidden'); currentPath = []; renderExplorer(); };
            startShutdown.onclick = () => { playSound(audioClickObj); startMenu.classList.add('hidden'); doPowerToggle(); };
            osWorkspace.onclick = (e) => { if (e.target === osWorkspace && !startMenu.classList.contains('hidden')) startMenu.classList.add('hidden'); };
            navBack.onclick = () => { playSound(audioClickObj); if (currentPath.length > 0) { currentPath.pop(); renderExplorer(); } };
            winExplorerClose.onclick = () => { playSound(audioClickObj); winExplorer.classList.add('hidden'); };
            document.getElementById('os-taskbar-explorer').onclick = () => { playSound(audioClickObj); if (winExplorer.classList.contains('hidden')) { winExplorer.classList.remove('hidden'); currentPath = []; renderExplorer(); } else winExplorer.classList.add('hidden'); };
            notepadClose.onclick = () => { playSound(audioClickObj); winNotepad.classList.add('hidden'); };

            // ========== NOTEPAD HELPER ==========
            function openNotepad(name, content, links) {
                document.getElementById('os-notepad-title').innerHTML = '<i class="fas fa-file-alt text-blue-400"></i> ' + name + ' - Блокнот';
                notepadContent.innerHTML = '';
                const textDiv = document.createElement('div');
                textDiv.style.whiteSpace = 'pre-wrap';
                textDiv.style.wordBreak = 'break-all';
                textDiv.textContent = content;
                notepadContent.appendChild(textDiv);
                if (links && links.length) {
                    const btnWrap = document.createElement('div');
                    btnWrap.style.cssText = 'display:flex;gap:8px;margin-top:16px;justify-content:center;flex-wrap:wrap;';
                    links.forEach((url, i) => {
                        const btn = document.createElement('button');
                        btn.type = 'button';
                        btn.textContent = 'Открыть ссылку ' + (i + 1);
                        btn.style.cssText = 'display:inline-block;padding:10px 18px;background:#3b82f6;color:white;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;transition:background 0.2s;border:none;';
                        btn.onmouseenter = () => { btn.style.background = '#2563eb'; };
                        btn.onmouseleave = () => { btn.style.background = '#3b82f6'; };
                        btn.addEventListener('click', () => {
                            playSound(audioClickObj);
                            window.open(url, '_blank', 'noopener,noreferrer');
                        });
                        btnWrap.appendChild(btn);
                    });
                    notepadContent.appendChild(btnWrap);
                }
                winNotepad.classList.remove('hidden');
            }

            // ========== PASSWORD ==========
            let currentLockedFolder = null;
            function openPasswordPrompt(folder) {
                currentLockedFolder = folder;
                pwdInput.value = '';
                pwdError.classList.add('hidden');
                winPassword.classList.remove('hidden');
                winPassword.classList.add('flex');
                setTimeout(() => pwdInput.focus(), 100);
            }
            pwdClose.onclick = () => { playSound(audioClickObj); winPassword.classList.add('hidden'); winPassword.classList.remove('flex'); };
            pwdInput.oninput = () => playSound(audioKeyObj);
            pwdInput.onkeypress = (e) => { if (e.key === 'Enter') checkPassword(); };
            pwdSubmit.onclick = () => { playSound(audioClickObj); checkPassword(); };
            function checkPassword() {
                if (pwdInput.value === currentLockedFolder.pwd) {
                    winPassword.classList.add('hidden');
                    winPassword.classList.remove('flex');
                    winExplorer.classList.add('hidden');
                    openGallery();
                } else {
                    pwdError.classList.remove('hidden');
                }
            }

            // ========== GALLERY ==========
            let currentGFile = 1;
            function openGallery() { currentGFile = 1; winGallery.classList.remove('hidden'); winGallery.classList.add('flex'); updateGalleryImage(); }
            galleryClose.onclick = () => { playSound(audioClickObj); winGallery.classList.add('hidden'); winGallery.classList.remove('flex'); winExplorer.classList.remove('hidden'); };
            galleryPrev.onclick = () => { playSound(audioClickObj); if (currentGFile > 1) { currentGFile--; updateGalleryImage(); } };
            galleryNext.onclick = () => { playSound(audioClickObj); currentGFile++; updateGalleryImage(); };
            function updateGalleryImage() {
                galleryCounter.textContent = currentGFile;
                galleryImg.src = 'assets/images/computer/egor_files/' + currentGFile + '.jpg';
                galleryImg.onerror = () => {
                    if (currentGFile > 1) {
                        currentGFile--;
                        galleryCounter.textContent = currentGFile + " (Нет дальше)";
                        galleryImg.src = 'assets/images/computer/egor_files/' + currentGFile + '.jpg';
                    }
                };
            }

            // ========== POWER BUTTON ==========
            function doPowerToggle() {
                playSound(audioClickObj);
                if (!audioContextUnlocked && isTouchDevice) unlockAudioContext();

                if (isPcOn) {
                    isPcOn = false;
                    clearBootFallback();
                    bootCompleted = false;
                    screenOff.classList.remove('hidden');
                    screenBoot.classList.add('hidden');
                    screenOs.classList.add('hidden');
                    screenOs.style.display = '';
                    winExplorer.classList.add('hidden');
                    winPassword.classList.add('hidden');
                    winNotepad.classList.add('hidden');
                    winGallery.classList.add('hidden');
                    winPassword.classList.remove('flex');
                    winGallery.classList.remove('flex');
                    if (monitorPwrBtn) monitorPwrBtn.classList.remove('monitor-power-btn--on');
                    clearInterval(hddInterval);
                    clearInterval(clockInterval);
                    audioNoise.pause();
                    audioNoise.currentTime = 0;
                    audioPwr.pause();
                } else {
                    isPcOn = true;
                    if (monitorPwrBtn) monitorPwrBtn.classList.add('monitor-power-btn--on');
                    screenOff.classList.add('hidden');
                    screenBoot.classList.remove('hidden');
                    bootLogo.classList.remove('opacity-100');
                    bootLogo.classList.add('opacity-0');
                    simulateHdd();
                    setTimeout(() => {
                        bootLogo.classList.remove('opacity-0');
                        bootLogo.classList.add('opacity-100');
                    }, 50);
                    bootCompleted = false;
                    clearBootFallback();
                    audioPwr.onended = null;
                    audioPwr.currentTime = 0;
                    audioPwr.onended = () => {
                        if (!isPcOn) return;
                        finishBootToOs();
                    };
                    bootFallbackTimer = setTimeout(() => finishBootToOs(), 5500);
                    audioPwr.play().catch(() => {
                        setTimeout(() => finishBootToOs(), 450);
                    });
                }
            }

            if (monitorPwrBtn) {
                monitorPwrBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    doPowerToggle();
                });
            }
            if (monitorCloseBtn) {
                monitorCloseBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    window.location.href = 'index.html';
                });
            }
        })();
    </script>
</body>

</html>
